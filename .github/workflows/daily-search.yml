name: Daily Nissan X Search

on:
  schedule:
    # 毎日 7:00 JST (= 22:00 UTC 前日)
    - cron: "0 22 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  search-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run search and post to Discord
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEARCH_KEYWORDS: ${{ vars.SEARCH_KEYWORDS || '日産,Nissan' }}
          SEARCH_DAYS: ${{ vars.SEARCH_DAYS || '1' }}
        run: npm start
