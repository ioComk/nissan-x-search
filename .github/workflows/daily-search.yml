name: Daily Nissan X Search

on:
  schedule:
    # 毎日 7:17 JST (= 22:17 UTC 前日)
    # 毎時0分は GitHub Actions の高負荷時間帯のため、遅延・欠落が起きやすい
    - cron: "17 22 * * *"
  workflow_dispatch: # 手動実行も可能

# 同時実行を防ぐ（前のデプロイが進行中なら新しい実行を待機）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  search-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # docs/data/ へのコミット用

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (search)
        run: npm ci

      - name: Build search script
        run: npm run build

      - name: Generate daily data
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SEARCH_KEYWORDS: ${{ vars.SEARCH_KEYWORDS || '日産,Nissan' }}
          SEARCH_DAYS: ${{ vars.SEARCH_DAYS || '1' }}
        run: npm start

      - name: Fetch xAI API balance
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_TEAM_ID: ${{ vars.XAI_TEAM_ID }}
        run: |
          if [ -z "$XAI_TEAM_ID" ]; then
            echo "XAI_TEAM_ID が未設定のためスキップ"
            exit 0
          fi
          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $XAI_API_KEY" \
            "https://api.x.ai/v1/billing/teams/$XAI_TEAM_ID/prepaid/balance")
          if [ $? -eq 0 ]; then
            echo "$RESPONSE" \
              | jq --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '. + {fetched_at: $ts}' \
              > docs/data/balance.json
            echo "残高を取得しました: $RESPONSE"
          else
            echo "残高の取得に失敗しました（team_id や API キーを確認してください）"
          fi

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "docs: ${DATE} の日産 X まとめを追加"
            git push
          fi

      - name: Install dependencies (site)
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: search-and-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
